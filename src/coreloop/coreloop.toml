# coreloop configuration
#
# Profiles are named agent configurations. Every profile inherits from
# [profiles.default] — keys in a named profile override the default.
#
# String values can reference environment variables with {{VAR_NAME}}.
# Example:  api_key = "{{OPENAI_API_KEY}}"
#
# Profile keys (all optional except model):
#
#   model                  = "qwen3.5:9b"
#   base_url               = "http://localhost:11434/v1"
#   api_key                = "{{MY_API_KEY}}"
#   system                 = "You are a helpful assistant."
#   tools                  = ["read", "ls", "grep"]
#   llm_extra_body         = {reasoning_effort = "medium"}
#   http_request_timeout   = 120.0
#   tool_timeout           = 60.0
#   llm_timeout            = 300.0
#   cache_dir              = "~/.cache/coreloop-llm-cache"

[profiles.default]
base_url = "http://localhost:11434/v1"
model = "qwen3.5:9b"

[profiles.openai]
base_url = "https://api.openai.com/v1"
api_key = "{{OPENAI_API_KEY}}"
model = "gpt-4o-mini"

[profiles.together]
base_url = "https://api.together.xyz/v1"
api_key = "{{TOGETHER_API_KEY}}"

[profiles.groq]
base_url = "https://api.groq.com/openai/v1"
api_key = "{{GROQ_API_KEY}}"

[profiles.openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key = "{{OPENROUTER_API_KEY}}"

[profiles.deepseek]
base_url = "https://api.deepseek.com/v1"
api_key = "{{DEEPSEEK_API_KEY}}"

# Add your own profiles below. Any OpenAI-compatible endpoint works:
#
# [profiles.lmstudio]
# base_url = "http://localhost:1234/v1"
#
# [profiles.vllm]
# base_url = "http://localhost:8000/v1"
#
# Profile-level config overrides (deep-merged with [config] below):
#
# [profiles.work.config.tool.web_search]
# url = "http://searxng.internal:8888"


# ── App / tool / UI settings ─────────────────────────────────────────────────
#
# Accessed via get_config("tool.read.max_lines", raw_profile).
# Profiles can override any key under [profiles.<name>.config.*].

[config.tool.read]
max_lines = 100
max_bytes = 10485760  # 10 MB

[config.tool.ls]
max_entries = 500

[config.tool.edit]
max_bytes = 10485760  # 10 MB

[config.tool.grep]
max_chars = 20000
timeout   = 30.0

[config.tool.bash]
max_chars       = 10000
max_raw_bytes   = 102400  # 100 KB
default_timeout = 180
max_timeout     = 300
# dangerous_patterns replaces the built-in block list entirely when set.
# Default patterns are in tools/bash.py:DEFAULT_DANGEROUS_PATTERNS.
# dangerous_patterns = [
#   "\\brm\\s+-rf\\s+/\\b",
#   "\\bdd\\s+if=",
#   ":\\(\\)\\s*\\{",
#   "\\bmkfs\\.",
#   "\\bmkswap\\b",
# ]
# or, use an on_before_tool hook for more control

# [config.tool.web_search]
# url = "http://localhost:8888"

[config.ui.ma]
max_turns            = 20
tool_result_preview  = 300
