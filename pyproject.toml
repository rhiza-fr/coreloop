[project]
name = "minimal-agent"
version = "0.1.0"
description = "A minimal LLM agent with tool-calling and CLI"
readme = "README.md"
authors = [
    { name = "Chris Kilner", email = "chris@rhiza.fr" }
]
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28.1",
    "typer>=0.26.1",
    "pydantic>=2.0,<3",
]

[project.scripts]
ma = "minimal_agent._cli:app"

[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.25.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.14",
]

[tool.ruff]
target-version = "py314"
line-length = 100
